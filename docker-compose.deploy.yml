services:
  frontend:
    image: ghcr.io/${{ steps.repo_owner.outputs.owner }}/item-flow-frontend:latest
    container_name: item-flow-frontend
    ports:
      - "${APP_PORT:-8088}:80"
    restart: always
    depends_on:
      - backend

  backend:
    image: ghcr.io/${{ steps.repo_owner.outputs.owner }}/item-flow-backend:latest
    container_name: item-flow-backend
    restart: always
    environment:
      - DB_TYPE=${DB_TYPE:-mongodb}
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/itemflow
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production

  mongo:
    image: mongo:7.0
    container_name: item-flow-db
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
